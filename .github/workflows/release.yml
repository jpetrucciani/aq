name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: aq
            artifact_suffix: linux-amd64-musl
            build_tool: zigbuild
            smoke_test: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: aq
            artifact_suffix: linux-aarch64-musl
            build_tool: zigbuild
            smoke_test: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aq
            artifact_suffix: macos-aarch64
            build_tool: cargo
            smoke_test: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aq.exe
            artifact_suffix: windows-amd64
            build_tool: cargo
            smoke_test: true

    steps:
      - name: checkout
        uses: actions/checkout@v6.0.1

      - name: install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.15.2
        with:
          target: ${{ matrix.target }}

      - name: install zig
        if: matrix.build_tool == 'zigbuild'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        uses: taiki-e/install-action@cargo-zigbuild

      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.build_tool }}" = "zigbuild" ]; then
            cargo zigbuild --release --locked --all-features --target ${{ matrix.target }}
          else
            cargo build --release --locked --all-features --target ${{ matrix.target }}
          fi

      - name: smoke test
        if: matrix.smoke_test
        shell: bash
        run: |
          ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }} -n null > /dev/null

      - name: prepare artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../../../aq-${{ matrix.artifact_suffix }}.zip ${{ matrix.artifact_name }}
          else
            tar czf ../../../aq-${{ matrix.artifact_suffix }}.tar.gz ${{ matrix.artifact_name }}
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: aq-${{ matrix.artifact_suffix }}
          path: aq-${{ matrix.artifact_suffix }}.*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: flatten files
        run: |
          mkdir release-files
          find artifacts -type f -name 'aq-*' -exec mv {} release-files/ \;

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          tag_name: ${{ github.ref_name }}
          make_latest: true
          generate_release_notes: true
